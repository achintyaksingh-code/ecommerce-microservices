name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build and test
        run: ./mvnw -B clean verify
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/target/surefire-reports"

  security-scan:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Dependency check
        run: ./mvnw -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9 || true

  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        service:
          - platform/config-server
          - platform/discovery-server
          - platform/api-gateway
          - services/auth-service
          - services/catalog-service
          - services/cart-service
          - services/order-service
          - services/payment-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build module
        run: ./mvnw -B -pl ${{ matrix.service }} -am package -DskipTests
      - name: Build image
        run: |
          docker build \
            --build-arg SERVICE_PATH=${{ matrix.service }} \
            -t ecommerce/${{ matrix.service }}:latest .
